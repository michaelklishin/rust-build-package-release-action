name: CI

on:
  push:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'action.yml'
      - '.github/workflows/ci.yaml'
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-rust:
    name: Rust Tests
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test
      - run: cargo clippy --all-targets -- -D warnings

  test-action:
    name: Test Action
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      # v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Create test files
        run: |
          mkdir -p test-project
          cat > test-project/Cargo.toml << 'EOF'
          [package]
          name = "test-project"
          version = "0.5.0"
          EOF

          cat > test-project/CHANGELOG.md << 'EOF'
          # Changelog

          ## v0.5.0 (Jan 31, 2026)

          ### Enhancements
          - New feature added

          ## v0.4.0 (Jan 1, 2026)

          - Previous release
          EOF

      - name: Test get-version
        uses: ./
        id: version
        with:
          command: get-version
          working-directory: test-project

      - name: Verify get-version output
        run: |
          if [ "${{ steps.version.outputs.version }}" != "0.5.0" ]; then
            echo "error: expected '0.5.0', got '${{ steps.version.outputs.version }}'"
            exit 1
          fi

      - name: Test extract-changelog
        uses: ./
        with:
          command: extract-changelog
          version: '0.5.0'
          working-directory: test-project

      - name: Verify extract-changelog output
        run: |
          if ! grep -q "## v0.5.0" test-project/release_notes.md; then
            echo "error: missing version header"
            exit 1
          fi
          if ! grep -q "New feature added" test-project/release_notes.md; then
            echo "error: missing expected content"
            exit 1
          fi
          if grep -q "Previous release" test-project/release_notes.md; then
            echo "error: should not contain previous version content"
            exit 1
          fi

      - name: Test validate-version
        uses: ./
        id: validate
        with:
          command: validate-version
          tag: v0.5.0
          expected-version: '0.5.0'
          working-directory: test-project

      - name: Verify validate-version output
        run: |
          if [ "${{ steps.validate.outputs.version }}" != "0.5.0" ]; then
            echo "error: expected '0.5.0', got '${{ steps.validate.outputs.version }}'"
            exit 1
          fi
